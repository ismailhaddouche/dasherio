services:
  mongo:
    image: mongo:7
    container_name: disherio_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - disherio_net
    environment:
      MONGO_INITDB_DATABASE: disherio
    # Resource limits for MongoDB
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: disherio_backend
    hostname: backend
    networks:
      disherio_net:
        aliases:
          - backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/disherio
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES:-8h}
      FRONTEND_URL: ${FRONTEND_URL}
    expose:
      - "3000"
    volumes:
      - disherio_uploads:/app/uploads
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: disherio_frontend
    hostname: frontend
    networks:
      disherio_net:
        aliases:
          - frontend
    restart: unless-stopped
    expose:
      - "4200"
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  caddy:
    image: caddy:2-alpine
    container_name: disherio_caddy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${PORT:-80}:${PORT:-80}"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - disherio_uploads:/srv/uploads:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - disherio_net
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  disherio_net:
    driver: bridge
    name: disherio_disherio_net

volumes:
  mongo_data:
    name: disherio_mongo_data
  disherio_uploads:
    name: disherio_uploads
  caddy_data:
    name: disherio_caddy_data
  caddy_config:
    name: disherio_caddy_config
