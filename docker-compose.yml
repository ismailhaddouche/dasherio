services:
  mongo:
    image: mongo:7
    container_name: disherio_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - disherio_net
    environment:
      MONGO_INITDB_DATABASE: disherio
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: disherio_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - disherio_net
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/disherio
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      JWT_EXPIRES: 8h
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    expose:
      - "3000"
    volumes:
      - disherio_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: disherio_frontend
    restart: unless-stopped
    networks:
      - disherio_net
    expose:
      - "4200"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: disherio_caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${PORT:-80}:${PORT:-80}"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - disherio_uploads:/srv/uploads:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - disherio_net

networks:
  disherio_net:
    driver: bridge

volumes:
  mongo_data:
  disherio_uploads:
  caddy_data:
  caddy_config:
